<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("vHbmTPTa6BKR43KsT");
})();

document.querySelector("form").addEventListener("submit", function(e) {
  e.preventDefault();

  emailjs.sendForm(
    "service_2ascxqv",
    "template_8ci68zf",
    this
  ).then(function() {
    alert("Message Sent Successfully ✅");
  }, function(error) {
    alert("Failed ❌");
  });
});
</script>
